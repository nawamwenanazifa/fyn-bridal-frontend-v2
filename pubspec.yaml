name: fyn_bridals
description: A high-end digital atelier for bespoke African bridal heritage.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # UI & Styling
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.5.0

  # Networking & Utilities
  http: ^1.1.0
  url_launcher: ^6.2.1
  intl: ^0.19.0

  # Image & File Handling
  image_picker: ^1.0.5
  file_picker: ^6.1.1
  cached_network_image: ^3.3.0

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Date & Time
  table_calendar: ^3.0.9

  # Forms & Validation
  email_validator: ^2.1.17

  # Loading Indicators
  shimmer: ^3.0.0

  # Icons
  cupertino_icons: ^1.0.6

  # Chat — Audio Recording & Playback
  record: ^5.0.0
  audio_waveforms: ^1.0.0
  path_provider: ^2.1.0
  audioplayers: ^5.2.1

  # Chat — Real-time WebSocket (Laravel Reverb)
  web_socket_channel: ^2.4.0

  # Chat — File upload helpers
  mime: ^1.0.4
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/onboard1.png
    - assets/images/onboard2.png
    - assets/images/onboard3.png
    - assets/images/
    - assets/icons/
    - assets/animations/